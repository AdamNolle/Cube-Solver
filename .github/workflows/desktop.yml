name: Desktop app

# Builds the Cube Solver native desktop app (Tauri) for macOS, Windows, and Linux.
# One codebase → a native installer per OS.

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Release-facing native formats. Linux's deb is the validated input used
          # by release.yml to produce the sandboxed Flatpak bundle.
          - os: macos-latest
            bundles: dmg
          - os: ubuntu-22.04
            bundles: deb
          - os: windows-latest
            bundles: nsis
    steps:
      - uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy

      # Tauri v2 system dependencies on Linux.
      - name: Install Linux deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libayatana-appindicator3-dev \
            librsvg2-dev build-essential curl wget file libxdo-dev libssl-dev

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target\nsrc-tauri -> src-tauri/target"

      - name: Install wasm-pack & Tauri CLI (prebuilt)
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack,tauri-cli

      # A wasm32 compile cannot catch browser-runtime traps (for example unsupported
      # clocks). Execute a sticker-only reduction and independent replay in Node on
      # every desktop OS before packaging.
      - name: Build and runtime-smoke the browser WASM
        run: |
          python tools/build-wasm.py
          node tools/wasm-runtime-smoke.mjs

      - name: Native 11x11 sticker-state reduction gate
        timeout-minutes: 15
        run: >-
          cargo test --release -p cube_wasm --lib
          tests::native_n11_sticker_entrypoint_solves_and_replays
          -- --ignored --exact --nocapture

      # Lint the (separate-workspace) Tauri shell once; deps are present on Linux.
      - name: Lint the Tauri shell
        if: matrix.os == 'ubuntu-22.04'
        working-directory: src-tauri
        run: |
          cargo fmt --all -- --check
          cargo clippy --all-targets -- -D warnings

      - name: Build the Tauri app
        working-directory: src-tauri
        run: cargo tauri build --bundles ${{ matrix.bundles }}

      - name: Upload bundles
        uses: actions/upload-artifact@v4
        with:
          name: cube-solver-${{ matrix.os }}
          path: |
            src-tauri/target/release/bundle/**
          if-no-files-found: error
