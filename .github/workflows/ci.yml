name: CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      # eframe/winit need these system libraries on Linux.
      - name: Install Linux GUI deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev libxcb-render0-dev libxcb-shape0-dev \
            libxcb-xfixes0-dev libxkbcommon-dev libssl-dev

      - uses: Swatinem/rust-cache@v2

      - name: Format and generated frontend check
        run: |
          cargo fmt --all -- --check
          python tools/gen-index.py --check
          python tools/frontend-smoke.py

      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace

      - name: Test the gated reduction solver
        run: cargo test -p cube_solver --features reduction

      - name: WASM solver core compiles (wasm32)
        run: cargo build -p cube_wasm --target wasm32-unknown-unknown

      - name: Release build
        run: cargo build --release --workspace

  reduction-release-gate:
    name: reduction release replay (4x4-11x11)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Replay-verified reduction corpus (4x4-8x8)
        run: >-
          cargo test --release -p cube_solver --features reduction
          reduction::finish::tests::full_solve_sizes -- --ignored --exact --nocapture
      - name: Replay-verified large reduction corpus (9x9-11x11)
        run: >-
          cargo test --release -p cube_solver --features reduction
          reduction::finish::tests::big_sizes -- --ignored --exact --nocapture
      - name: WASM integration reduction replay (4x4-5x5)
        run: >-
          cargo test --release -p cube_wasm --lib
          tests::reduction_path_solves -- --exact --nocapture
